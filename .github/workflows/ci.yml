name: CI
on: [push, pull_request]
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - run: cd mcp-server && pnpm install
      - name: Format check
        run: cd mcp-server && pnpm run format:check
      - name: Lint
        run: cd mcp-server && pnpm run lint
      - name: Build (TypeScript)
        run: cd mcp-server && pnpm run build
      - name: Tests
        run: cd mcp-server && pnpm run test
