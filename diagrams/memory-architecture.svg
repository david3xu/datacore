<text x="40" y="318" font-size="14" font-weight="500" fill="#2C2C2A">Layer 3 - Project knowledge</text>
<text x="278" y="318" font-size="12" fill="#5F5E5A">on-demand, files on disk</text>
<rect x="100" y="330" width="500" height="50" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="350" y="348" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#534AB7">docs/workflow.md  |  datacore/DESIGN.md  |  AI-ORG-CHART.md</text>
<text x="350" y="364" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#534AB7">Shared files - any AI reads on demand (not loaded every turn)</text>
