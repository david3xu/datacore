<text x="235" y="424" font-size="12" fill="#5F5E5A">MCP, all AIs, searchable</text>
<rect x="50" y="436" width="580" height="50" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text x="340" y="454" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#633806">Datacore Bronze</text>
<text x="340" y="470" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#854F0B">Raw events, full-text grep - 20,000+ events (NOW)</text>
<rect x="50" y="496" width="280" height="40" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text x="190" y="510" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#712B13">Silver</text>
<text x="190" y="524" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#993C1D">Semantic search (FUTURE)</text>
<rect x="350" y="496" width="280" height="40" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
<text x="490" y="510" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#27500A">Gold</text>
<text x="490" y="524" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#3B6D11">Curated facts (FUTURE)</text>
<line x1="233" y1="272" x2="233" y2="434" stroke="#BA7517" stroke-width="0.5" stroke-dasharray="4 3"/>
<line x1="384" y1="272" x2="384" y2="434" stroke="#BA7517" stroke-width="0.5" stroke-dasharray="4 3"/>
<line x1="555" y1="272" x2="555" y2="434" stroke="#BA7517" stroke-width="0.5" stroke-dasharray="4 3"/>
<text x="340" y="560" text-anchor="middle" font-size="12" fill="#5F5E5A">Dashed lines: file watchers + hooks auto-capture working memory into Datacore</text>
<text x="340" y="585" text-anchor="middle" font-size="12" fill="#5F5E5A">Each layer exists because it has a unique access pattern the others cannot serve</text>
<text x="340" y="602" text-anchor="middle" font-size="12" fill="#5F5E5A">As Silver + Gold mature, Layer 1 shrinks from 6000 to 500 tokens</text>
