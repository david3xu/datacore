<text x="233" y="134" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#993556">SOUL.md</text>
<text x="233" y="148" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#993556">AGENTS.md (slim)</text>
