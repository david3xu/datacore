<text x="384" y="134" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#185FA5">.claude/CLAUDE.md</text>
<text x="384" y="148" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#185FA5">Role + startup</text>
