<text x="233" y="252" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#993556">~/.openclaw/sessions/</text>
<rect x="314" y="222" width="140" height="50" rx="6" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text x="384" y="238" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#185FA5">Conversation buffer</text>
<text x="384" y="252" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#185FA5">(app-internal)</text>
<rect x="470" y="222" width="170" height="50" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="555" y="238" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0F6E56">Session files</text>
<text x="555" y="252" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0F6E56">~/.codex/ ~/.gemini/</text>
