<svg width="1360" height="1240" viewBox="0 0 680 620" xmlns="http://www.w3.org/2000/svg" style="background:#fff;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">
<text x="340" y="20" text-anchor="middle" font-size="14" font-weight="500" fill="#2C2C2A">Memory architecture by role</text>
